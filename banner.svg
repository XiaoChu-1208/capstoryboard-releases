    <!-- Center scissors (cutting through the paper plane) -->
    <g transform="translate(-10, -30)">
      <g transform="scale(1, 0.577) rotate(-45)">
        <g transform="rotate(15)">
          <path d="M -30,5 L 60,0 L 100,-5 L 60,-10 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />
          <path d="M -30,-5 L 60,0 L 100,5 L 60,10 Z" fill="#94a3b8" stroke="#64748b" stroke-width="1" />
          <ellipse cx="-50" cy="-20" rx="25" ry="15" fill="none" stroke="#ff4d4f" stroke-width="10" />
          <ellipse cx="-50" cy="20" rx="25" ry="15" fill="none" stroke="#ff4d4f" stroke-width="10" />
          <circle cx="20" cy="0" r="5" fill="#1d1d1f" />
        </g>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(400, 480)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', 'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="46" fill="#1d1d1f" letter-spacing="8">CAP STORYBOARD</text>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', 'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="16" fill="#ff4d4f" letter-spacing="12">REALTIME SYNC</text>
  </g>
</svg>
