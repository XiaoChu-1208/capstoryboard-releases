            <rect x="-110" y="-150" width="220" height="300" rx="6" fill="#ffffff" stroke="#d2d2d7" stroke-width="2" opacity="1" />
            <g>
              <rect x="-95" y="-135" width="190" height="12" rx="2" fill="#f5f5f7" />
              <rect x="-90" y="-132" width="40" height="6" rx="1" fill="#d2d2d7" opacity="0.5" />
              <rect x="50" y="-132" width="40" height="6" rx="1" fill="#d2d2d7" opacity="0.5" />
              <line x1="-95" y1="-115" x2="-95" y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <line x1="-75" y1="-115" x2="-75" y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <line x1="15"  y1="-115" x2="15"  y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <line x1="75"  y1="-115" x2="75"  y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <line x1="95"  y1="-115" x2="95"  y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <g>
              <line x1="-95" y1="-115" x2="95" y2="-115" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <rect x="-70" y="-110" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.1" />
              <circle cx="-30" cy="-90" r="8" fill="#ff4d4f" opacity="0.2" />
              <path d="M -50 -70 Q -30 -100 -10 -70" fill="none" stroke="#ff4d4f" stroke-width="2" opacity="0.2" />
              <line x1="22" y1="-100" x2="68" y2="-100" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="-90" x2="55" y2="-90" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="-80" x2="60" y2="-80" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              </g>
              <g>
              <line x1="-95" y1="-65" x2="95" y2="-65" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <rect x="-70" y="-60" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.1" />
              <circle cx="-30" cy="-40" r="8" fill="#ff4d4f" opacity="0.2" />
              <path d="M -50 -20 Q -30 -50 -10 -20" fill="none" stroke="#ff4d4f" stroke-width="2" opacity="0.2" />
              <line x1="22" y1="-50" x2="68" y2="-50" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="-40" x2="55" y2="-40" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="-30" x2="60" y2="-30" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              </g>
              <g>
              <line x1="-95" y1="-15" x2="95" y2="-15" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <rect x="-70" y="-10" width="80" height="40" rx="2" fill="none" stroke="#d2d2d7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
              <line x1="22" y1="0" x2="68" y2="0" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="10" x2="55" y2="10" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="20" x2="60" y2="20" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              </g>
              <g>
              <line x1="-95" y1="35" x2="95" y2="35" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <rect x="-70" y="40" width="80" height="40" rx="2" fill="none" stroke="#d2d2d7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
              <line x1="22" y1="50" x2="68" y2="50" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="60" x2="55" y2="60" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="70" x2="60" y2="70" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              </g>
              <g>
              <line x1="-95" y1="85" x2="95" y2="85" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
              <rect x="-70" y="90" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.1" />
              <circle cx="-30" cy="110" r="8" fill="#ff4d4f" opacity="0.2" />
              <path d="M -50 130 Q -30 100 -10 130" fill="none" stroke="#ff4d4f" stroke-width="2" opacity="0.2" />
              <line x1="22" y1="100" x2="68" y2="100" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="110" x2="55" y2="110" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              <line x1="22" y1="120" x2="60" y2="120" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round" opacity="0.6" />
              </g>
              <line x1="-95" y1="135" x2="95" y2="135" stroke="#d2d2d7" stroke-width="1" opacity="0.5" />
            </g>
          </g>
        </g>
