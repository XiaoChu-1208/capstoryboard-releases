<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" aria-label="CapStoryBoard hero">
  <g transform="translate(400, 260)">
    <!-- Left scattered papers (cut pieces flying off) -->
    <g transform="translate(-160, 40)">
      <g transform="translate(-30, 20)">
        <g transform="scale(1, 0.577) rotate(-45)">
          <g transform="rotate(-15)">
            <rect x="-45" y="-25" width="90" height="50" rx="4" fill="#ffffff" stroke="#d2d2d7" stroke-width="2" />
            <rect x="-40" y="-20" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.15" />
            <circle cx="0" cy="0" r="10" fill="#ff4d4f" opacity="0.3" />
            <path d="M -25 20 Q 0 -15 25 20" fill="none" stroke="#ff4d4f" stroke-width="3" opacity="0.3" />
            <rect x="-40" y="-20" width="16" height="10" rx="1" fill="#ff4d4f" opacity="0.8" />
            <text x="-32" y="-13" font-size="6" fill="#ffffff" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" text-anchor="middle" font-weight="700">C03</text>
          </g>
        </g>
      </g>
      <g transform="translate(10, -40)">
        <g transform="scale(1, 0.577) rotate(-45)">
          <g transform="rotate(-5)">
            <rect x="-45" y="-25" width="90" height="50" rx="4" fill="#ffffff" stroke="#d2d2d7" stroke-width="2" />
            <rect x="-40" y="-20" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.15" />
            <circle cx="0" cy="0" r="10" fill="#ff4d4f" opacity="0.3" />
            <path d="M -25 20 Q 0 -15 25 20" fill="none" stroke="#ff4d4f" stroke-width="3" opacity="0.3" />
            <rect x="-40" y="-20" width="16" height="10" rx="1" fill="#ff4d4f" opacity="0.8" />
            <text x="-32" y="-13" font-size="6" fill="#ffffff" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" text-anchor="middle" font-weight="700">C02</text>
          </g>
        </g>
      </g>
      <g transform="translate(70, 10)">
        <g transform="scale(1, 0.577) rotate(-45)">
          <g transform="rotate(8)">
            <rect x="-45" y="-25" width="90" height="50" rx="4" fill="#ffffff" stroke="#d2d2d7" stroke-width="2" />
            <rect x="-40" y="-20" width="80" height="40" rx="2" fill="#ff4d4f" opacity="0.15" />
            <circle cx="0" cy="0" r="10" fill="#ff4d4f" opacity="0.3" />
            <path d="M -25 20 Q 0 -15 25 20" fill="none" stroke="#ff4d4f" stroke-width="3" opacity="0.3" />
            <rect x="-40" y="-20" width="16" height="10" rx="1" fill="#ff4d4f" opacity="0.8" />
            <text x="-32" y="-13" font-size="6" fill="#ffffff" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" text-anchor="middle" font-weight="700">C01</text>
          </g>
        </g>
      </g>
    </g>

    <!-- Right neat paper stack (storyboard master) -->
    <g transform="translate(140, 20)">
        <g transform="translate(0, 0)">
          <g transform="scale(1, 0.577) rotate(-45)">
            <rect x="-110" y="-150" width="220" height="300" rx="6" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="2" opacity="0.5" />
          </g>
        </g>
        <g transform="translate(0, -8)">
          <g transform="scale(1, 0.577) rotate(-45)">
            <rect x="-110" y="-150" width="220" height="300" rx="6" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="2" opacity="0.5" />
          </g>
        </g>
        <g transform="translate(0, -16)">
          <g transform="scale(1, 0.577) rotate(-45)">
            <rect x="-110" y="-150" width="220" height="300" rx="6" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="2" opacity="0.5" />
          </g>
        </g>
        <g transform="translate(0, -24)">
          <g transform="scale(1, 0.577) rotate(-45)">
            <rect x="-110" y="-150" width="220" height="300" rx="6" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="2" opacity="0.5" />
          </g>
        </g>
